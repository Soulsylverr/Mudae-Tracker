<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mudae Tracker Display</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111214;
        color: #f2f2f7;
        width: 320px;
        min-height: 220px;
        padding: 16px;
        box-sizing: border-box;
      }
      h1 { font-size: 16px; margin: 0 0 8px; }
      p { font-size: 13px; color: #b5bac1; line-height: 1.45; margin: 0 0 12px; }
      .actions { display: flex; flex-direction: column; gap: 8px; }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        color: white;
        background: #5865f2;
      }
      button.secondary { background: #2b2d31; }
      .status { margin-top: 10px; font-size: 12px; color: #8e8e93; }
    </style>
  </head>
  <body>
    <h1>Mudae Tracker Display</h1>
    <p>Open a dedicated browser tab to show the same Firebase-backed HUD as the BetterDiscord plugin.</p>
    <div class="actions">
      <button id="open-display">Open display tab</button>
      <button class="secondary" id="open-options">Open options</button>
    </div>
    <div class="status" id="status">Ready</div>
    <script src="src/popup.js"></script>
  </body>
</html>
